version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/go.mod"
    vendor: vendor
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Berlin"

  - package-ecosystem: "pip"
    directory: "/tests"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Berlin"

  - package-ecosystem: "github-actions"
    directory: "/.github/workflows" # Location of package manifests
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Europe/Berlin"
