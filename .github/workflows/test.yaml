name: Test

on:
  # In-repo (maintainer) PRs run automatically. Fork PRs lack secret access and
  # must be triggered by a maintainer commenting /test (see test-slash-command.yaml).
  pull_request:
    branches: [ main ]
  repository_dispatch:
    types: [test-command]
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA or branch to test"
        required: false
        default: ""
  merge_group:

permissions:
  contents: read

jobs:
  build:
    name: Build
    # Skip fork PRs on the pull_request event (they have no secret access); the
    # /test slash command handles them via repository_dispatch instead.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.pull_request.head.sha || inputs.ref || github.sha }}

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - uses: taiki-e/install-action@just

      - name: Install dependencies
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          go install github.com/goreleaser/goreleaser/v2@latest

      - name: Build package
        run: just build-local

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist

  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: Test Auto
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      COMPOSE_PROJECT_NAME: ci_${{ github.run_id }}_${{ github.run_attempt || '1' }}
      IMAGE: ${{ matrix.job.image }}_ci_${{ github.run_id }}_${{ github.run_attempt || '1' }}
      IMAGE_SRC: ${{ matrix.job.image }}
    strategy:
      fail-fast: false
      matrix:
        job:
          # - { name: "debian-systemd-native", image: "debian-systemd-native", test_options: "" }
          - { name: "debian-systemd-container", image: "debian-systemd-container", test_options: "" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.pull_request.head.sha || inputs.ref || github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist

      - name: create .env file
        run: |
          {
            echo 'C8Y_BASEURL="${{ secrets.C8Y_BASEURL }}"'
            echo 'C8Y_USER="${{ secrets.C8Y_USER }}"'
            echo 'C8Y_PASSWORD="${{ secrets.C8Y_PASSWORD }}"'
          } > .env

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            tests/requirements.txt

      - uses: taiki-e/install-action@just

      - name: Install test dependencies
        run: |
          just venv
          just build-test

      - name: Run tests
        run: just test ${{ matrix.job.test_options }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports-${{ matrix.job.name }}
          path: output

      - name: Send report to commit
        if: ${{ always() && (github.event_name == 'pull_request' || github.event_name == 'repository_dispatch') }}
        uses: "joonvena/robotframework-reporter-action@v2.5"
        with:
          report_path: output
          show_passed_tests: "false"
          gh_access_token: ${{ secrets.GITHUB_TOKEN }}
          pull_request_id: ${{ github.event.pull_request.number || github.event.client_payload.pull_request.number }}
          sha: ${{ github.event.client_payload.pull_request.head.sha || github.sha }}

  tests-pass:
    name: Tests Pass
    needs: [build, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all matrix jobs passed
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build job failed: ${{ needs.build.result }}"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more matrix jobs failed: ${{ needs.test.result }}"
            exit 1
          fi
